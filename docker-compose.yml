services:
  picdrop:
    build: .
    container_name: picdrop
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: fotobox
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.picdrop.rule=Host(`picdrop.klimarschanlage.de`)"
      - "traefik.http.routers.picdrop.entrypoints=https"
      - "traefik.http.routers.picdrop.tls=true"
      - "traefik.http.routers.picdrop.tls.certresolver=letsencrypt"
      - "traefik.docker.network=traefik"

      - "traefik.http.routers.picdrop-admin.rule=Host(`picdrop.klimarschanlage.de`) && Path(`/info.php`)"
      - "traefik.http.routers.picdrop-admin.entrypoints=https"
      - "traefik.http.routers.picdrop-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.picdrop-admin.priority=100"
      - "traefik.http.routers.picdrop-admin.middlewares=authentikAuthKlimarsch@file"
    networks:
      - default
      - traefik

  db:
    image: mariadb:10.11
    container_name: picdrop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fotobox
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  traefik:
    external: true