services:
  picdrop:
    image: ghcr.io/greidal/picdrop:latest
    container_name: picdrop
    restart: unless-stopped
    volumes:
      - picdrop_uploads:/var/www/html/uploads
    environment:
      # Database Configuration
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: fotobox
      # SMTP Configuration
      SMTP_HOST: ${SMTP_HOST:-smtp.ionos.de}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-PicDrop Fotobox}
      # Application Configuration
      REGISTRATION_CODE: ${REGISTRATION_CODE}
      # Bootstrap Admin User (all required for admin creation)
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.picdrop.rule=Host(`picdrop.klimarschanlage.de`)"
      - "traefik.http.routers.picdrop.entrypoints=https"
      - "traefik.http.routers.picdrop.tls=true"
      - "traefik.http.routers.picdrop.tls.certresolver=letsencrypt"
      - "traefik.docker.network=traefik"
    networks:
      - default
      - traefik

  db:
    image: mariadb:10.11
    container_name: picdrop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fotobox
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - picdrop_db:/var/lib/mysql

networks:
  traefik:
    external: true

volumes:
  picdrop_db:
  picdrop_uploads: